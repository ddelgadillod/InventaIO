  <path d="M256 60 L422 168 L422 344 L256 452 L90 344 L90 168 Z"
        fill="#3B82F6" stroke="none"/>
  <!-- Cube - top face -->
  <path d="M256 140 L360 200 L256 260 L152 200 Z"
