  <!-- Cube edges -->
  <path d="M256 140 L360 200 L256 260 L152 200 Z"
        fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.3"/>
  <path d="M152 200 L256 260 L256 370 L152 310 Z"
        fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.2"/>
  <path d="M360 200 L256 260 L256 370 L360 310 Z"
        fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.2"/>
  <!-- Teal circuit node on cube -->
  <circle cx="310" cy="280" r="16" fill="#14B8A6"/>
  <circle cx="310" cy="280" r="7" fill="#FFFFFF"/>
  <!-- Teal circuit line from node -->
  <line x1="310" y1="264" x2="310" y2="230" stroke="#14B8A6" stroke-width="4" stroke-linecap="round"/>
  <line x1="310" y1="230" x2="340" y2="215" stroke="#14B8A6" stroke-width="4" stroke-linecap="round"/>
  <circle cx="340" cy="215" r="6" fill="#14B8A6"/>
</svg>