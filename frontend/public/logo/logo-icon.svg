<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Hexagon background -->
  <path d="M256 20 L462 148 L462 364 L256 492 L50 364 L50 148 Z"
        fill="#2563EB" stroke="none"/>
