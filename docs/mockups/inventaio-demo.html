<style>
/* Drawer */
.drawer-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:40; opacity:0; pointer-events:none; transition:opacity .25s ease; backdrop-filter:blur(2px); }
.drawer-backdrop.open { opacity:1; pointer-events:auto; }
.drawer { position:fixed; top:0; left:0; bottom:0; width:280px; z-index:50; transform:translateX(-100%); transition:transform .25s cubic-bezier(.4,0,.2,1); }
.drawer.open { transform:translateX(0); }
/* Screen transitions */
.screen { display:none; opacity:0; transition:opacity .2s ease; }
.screen.active { display:flex; flex-direction:column; opacity:1; }
/* Bottom nav */
.bottom-nav { display:none; }
@media (max-width:767px) { .bottom-nav { display:flex; } .main-pad { padding-bottom:56px; } }
/* Scrollbar */
.scr::-webkit-scrollbar { width:5px; } .scr::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:10px; }
/* Toggle switch */
.tog { position:relative; width:40px; height:22px; }
.tog input { position:absolute; opacity:0; width:100%; height:100%; cursor:pointer; margin:0; z-index:1; }
.tog .dot { position:absolute; top:2px; left:2px; width:18px; height:18px; background:#fff; border-radius:50%; transition:transform .2s; box-shadow:0 1px 3px rgba(0,0,0,.15); }
.tog { background:#CBD5E1; border-radius:11px; }
.tog:has(input:checked) { background:#2563EB; }
.tog:has(input:checked) .dot { transform:translateX(18px); }
/* Typing dots */
@keyframes pulse-dot { 0%,80%,100%{opacity:.3;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }
.anim-dot { animation: pulse-dot 1.4s infinite ease-in-out both; }
.anim-dot:nth-child(2) { animation-delay:.16s; }
.anim-dot:nth-child(3) { animation-delay:.32s; }
/* Chat bubbles */
.bub-agent { background:#fff; border:1px solid #E2E8F0; border-radius:16px 16px 16px 4px; }
.bub-user { background:#2563EB; color:#fff; border-radius:16px 16px 4px 16px; }
</style>

<script>
const HEADERS = {
  'chat-empty': '<div class="flex items-center space-x-2"><div class="w-7 h-7 rounded-full bg-[#14B8A6] flex items-center justify-center text-white text-[9px] font-bold">IA</div><span class="font-semibold text-slate-800 text-sm">Asistente InventAI/o</span></div>',
  'chat-active': '<div class="flex items-center space-x-2"><div class="w-7 h-7 rounded-full bg-[#14B8A6] flex items-center justify-center text-white text-[9px] font-bold">IA</div><span class="font-semibold text-slate-800 text-sm">Asistente InventAI/o</span></div>',
  'chat-states': '<div class="flex items-center space-x-2"><div class="w-7 h-7 rounded-full bg-[#14B8A6] flex items-center justify-center text-white text-[9px] font-bold">IA</div><span class="font-semibold text-slate-800 text-sm">Asistente InventAI/o</span></div>',
  'dashboard': '<div><h1 class="text-sm font-bold text-slate-800">Resumen</h1><p class="text-[10px] text-slate-500">Operativo al día de hoy</p></div>',
  'config': '<div><h1 class="text-sm font-bold text-slate-800">Configuración</h1><p class="text-[10px] text-slate-500">Perfil, seguridad, notificaciones</p></div>',
  'components': '<div><h1 class="text-sm font-bold text-slate-800">Componentes del Chat</h1><p class="text-[10px] text-slate-500">Widgets inline del agente</p></div>',
};

const NAV_MAP = { 'chat-empty':'chat-empty','chat-active':'chat-empty','chat-states':'chat-empty','dashboard':'dashboard','config':'config','components':'chat-empty' };

let current = 'login';

function go(page) {
  // Close drawer
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('backdrop').classList.remove('open');

  if (page === 'login') {
    document.getElementById('page-login').classList.add('active');
    document.getElementById('app-shell').classList.remove('active');
    document.getElementById('bottom-nav').style.display = 'none';
    current = 'login';
    return;
  }

  // Show app shell
  document.getElementById('page-login').classList.remove('active');
  document.getElementById('app-shell').classList.add('active');
  document.getElementById('bottom-nav').style.removeProperty('display');

  // Set header
  document.getElementById('header-content').innerHTML = HEADERS[page] || '';

  // Load template
  const tpl = document.getElementById('tpl-' + page);
  const container = document.getElementById('page-content');
  container.innerHTML = '';
  if (tpl) container.appendChild(tpl.content.cloneNode(true));

  // Highlight nav
  document.querySelectorAll('.nav-link').forEach(el => {
    el.classList.toggle('bg-white/10', el.dataset.page === NAV_MAP[page]);
    el.classList.toggle('text-white', el.dataset.page === NAV_MAP[page]);
    el.classList.toggle('text-white/60', el.dataset.page !== NAV_MAP[page]);
  });
  document.querySelectorAll('.bnav').forEach(el => {
    el.classList.toggle('text-[#2563EB]', el.dataset.page === NAV_MAP[page]);
    el.classList.toggle('text-slate-400', el.dataset.page !== NAV_MAP[page]);
  });

  // Post-render hooks
  lucide.createIcons();
  if (page === 'dashboard') setTimeout(drawSparkline, 50);
  current = page;
}

function toggleDrawer() {
  document.getElementById('drawer').classList.toggle('open');
  document.getElementById('backdrop').classList.toggle('open');
}

function drawSparkline() {
  const c = document.getElementById('spark');
  if (!c) return;
  const x = c.getContext('2d');
  const p = c.parentElement;
  c.width = p.clientWidth; c.height = p.clientHeight;
  const d=[120,150,140,190,210,180,250,220,240,280,260,310,290,340], w=c.width, h=c.height;
  const mx=Math.max(...d), mn=Math.min(...d), r=mx-mn;
  const pts=d.map((v,i)=>({x:(i/(d.length-1))*w, y:h-((v-mn)/r)*(h-20)-10}));
  x.beginPath();x.moveTo(0,h);pts.forEach(p=>x.lineTo(p.x,p.y));x.lineTo(w,h);x.closePath();x.fillStyle='#EFF6FF';x.fill();
  x.beginPath();x.moveTo(pts[0].x,pts[0].y);pts.forEach(p=>x.lineTo(p.x,p.y));x.strokeStyle='#3B82F6';x.lineWidth=2.5;x.lineJoin='round';x.stroke();
  const l=pts[pts.length-1];x.beginPath();x.arc(l.x,l.y,4,0,Math.PI*2);x.fillStyle='#14B8A6';x.fill();x.strokeStyle='#fff';x.lineWidth=2;x.stroke();
}

window.addEventListener('resize', () => { if(current==='dashboard') drawSparkline(); });

// Init
lucide.createIcons();
document.getElementById('bottom-nav').style.display = 'none';
</script>
